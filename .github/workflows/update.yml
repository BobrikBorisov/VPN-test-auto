name: Update WAP Sub
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests
          
      - name: Run Scraper
        run: |
          ls -la
          python wap_scraper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add wap_sub.txt
          git commit -m "Автообновление WAP-подписки" || echo "Нет новых изменений для коммита"
          git push
